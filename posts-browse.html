<!DOCTYPE html>
<html lang="ko" data-theme="light">

<head><script>(function(){try{var d=document.documentElement,t=localStorage.getItem('theme')||'light',p=localStorage.getItem('palette')||'cream';d.setAttribute('data-theme',t);d.setAttribute('data-palette',p);}catch(e){}})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ad Tech Blog 전체 글 탐색 — 카테고리·태그 다중 필터, 정렬, 검색으로 원하는 글을 빠르게 찾으세요.">
  <title>전체 글 — Ad Tech Blog</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="alternate" type="application/atom+xml" title="Ad Tech Blog Feed" href="/adtech-blog/feed.xml">
</head>

<body>
  <header>
    <nav>
      <a href="index.html" class="logo">AdTech Blog</a>
      <div class="nav-content">
        <ul class="nav-links">
          <li><a href="index.html">홈</a></li>
          <li><a href="about.html">소개</a></li>
        </ul>
        <div class="nav-actions">
          <a href="posts-browse.html" class="btn-demo btn-posts-active">Posts</a>
          <a href="ecosystem.html" class="btn-demo">Ecosystem</a>
          <a href="demos.html" class="btn-demo">데모</a>
          <button id="theme-toggle" class="theme-toggle" aria-label="테마 선택"></button>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <h1>전체 글</h1>
        <p>카테고리·태그로 거르고, 정렬·검색으로 빠르게 찾으세요.</p>
      </div>
    </section>

    <!-- Category filter (다중 선택) -->
    <nav class="category-nav">
      <div class="container">
        <div id="browse-categories" class="category-tabs" aria-label="카테고리 필터 (복수 선택)"></div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <div class="search-filter-bar">
          <div class="search-box">
            <input type="text" id="browse-search" placeholder="제목·내용·태그로 검색..." aria-label="글 검색">
          </div>
          <div class="filter-section">
            <h4>Tags</h4>
            <div id="browse-tags" class="filter-tags" aria-label="태그 필터 (복수 선택)"></div>
            <button id="browse-tag-toggle" class="filter-section-toggle" type="button" aria-expanded="false" aria-controls="browse-tags">전체 태그 보기</button>
          </div>
        </div>

        <div class="browse-toolbar">
          <span id="browse-count" class="browse-count" aria-live="polite"></span>
          <div class="browse-toolbar-right">
            <button id="browse-clear" class="filter-section-toggle" type="button" hidden>필터 초기화</button>
            <label class="browse-sort">정렬
              <select id="browse-sort">
                <option value="newest">최신순</option>
                <option value="oldest">오래된순</option>
                <option value="readtime">읽기 시간순</option>
              </select>
            </label>
          </div>
        </div>

        <div id="browse-grid" class="posts-grid"></div>
        <div class="browse-more"><button id="browse-more" class="btn-try" type="button" hidden>더 보기</button></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-links">
        <a href="index.html">홈</a>
        <a href="about.html">소개</a>
        <a href="demos.html">데모</a>
        <a href="ecosystem.html">Ecosystem</a>
        <a href="https://github.com/chkimsu/adtech-blog" target="_blank" rel="noopener">GitHub</a>
      </div>
      <p class="footer-text">&copy; 2026 Ad Tech Blog. 한국어로 읽는 애드테크 기술 블로그.</p>
    </div>
  </footer>

  <script src="js/posts.js"></script>
  <script src="js/main.js"></script>
  <script src="js/browse.js"></script>
</body>

</html>
