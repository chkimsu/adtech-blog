<body>

    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Dynamically populated by JavaScript -->
    </nav>
  </aside>

  <!-- Sidebar Toggle Button (Mobile) -->
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
    TOC
  </button>

  <!-- Main Content Wrapper -->
  <div class="with-sidebar" id="main-content">
    <!-- Breadcrumb -->
    <div id="breadcrumb" class="breadcrumb-container"></div>

    <!-- Post Header -->
    <section class="post-header" id="post-header">
      <!-- Dynamically populated by JavaScript -->
    </section>

    <section class="continue-reading-top" id="continue-reading-top">
      <!-- Dynamically populated by JavaScript -->
    </section>

    <!-- Post Content -->
    <section class="section">
      <div class="container">
        <article class="post-content" id="post-content">
          <!-- Dynamically populated by JavaScript -->
        </article>
      </div>
    </section>

    <!-- Related Posts -->
    <section class="related-posts" id="related-posts">
      <!-- Dynamically populated by JavaScript -->
    </section>

  </div><!-- End of main content wrapper -->

  <a id="mobile-next-cta" class="mobile-next-cta" href="#" hidden></a>

      <div class="search-modal-hint">↑↓ 탐색 · Enter 이동 · Esc 닫기</div>
